<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <!-- 与 src/context/ThemeContext.tsx#getStoredTheme 同步：首帧前挂上 dark，避免打包后浅色系统首访或 JS 前闪浅色 -->
  <script>
    (function () {
      try {
        var k = 'portfolio-theme';
        var t = localStorage.getItem(k);
        var dark = t === 'dark' || t !== 'light';
        document.documentElement.classList.toggle('dark', dark);
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,450;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,450&display=swap"
  />
  <link rel="icon" type="image/png" href="/og.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>%HTML_TITLE%</title>
  <meta name="description" content="%OG_DESCRIPTION%" />
  <link rel="canonical" href="%SITE_URL%/" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="%SITE_URL%/" />
  <meta property="og:title" content="%OG_TITLE%" />
  <meta property="og:description" content="%OG_DESCRIPTION%" />
  <meta property="og:image" content="%SITE_URL%/og.png" />
  <meta property="og:locale" content="zh_CN" />
  <meta property="og:locale:alternate" content="en_US" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="%OG_TITLE%" />
  <meta name="twitter:description" content="%OG_DESCRIPTION%" />
  <meta name="twitter:image" content="%SITE_URL%/og.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
